server.port=8080

# Carga opcional de secretos locales (backend-springboot/application-local.properties)
spring.config.import=optional:file:./application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/clinica_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.jwt.secret=${JWT_SECRET:NovaSaludClinicaSecretKey2026Minimo32Chars!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.ia.url=${IA_SERVICE_URL:http://127.0.0.1:8000/api/ia/evaluar-riesgo}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
app.admin.email=${ADMIN_EMAIL:admin@novasalud.com}
app.admin.password=${ADMIN_PASSWORD:AdminNova2026!}
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:15}
